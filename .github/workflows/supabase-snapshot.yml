name: Snapshot do banco Supabase

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link ao projeto
        run: supabase link --project-ref xzkmokjyaqutkjxqlkck

      - name: Dump do schema
        run: supabase db dump --linked -f supabase/schema.sql

      - name: Commit automático se houver mudança
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualização automática do schema do Supabase"
          file_pattern: supabase/schema.sql