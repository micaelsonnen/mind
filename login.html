<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mind — Entrar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --accent: #6c8fff;
    --accent2: #a78bfa;
    --text: #e8eaf0;
    --muted: #8b8fa8;
    --error: #f87171;
    --success: #34d399;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    width: 100%;
    max-width: 420px;
  }
  .logo {
    text-align: center;
    margin-bottom: 40px;
  }
  .logo-mark {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 800;
    color: white;
    margin-bottom: 16px;
    letter-spacing: -1px;
  }
  .logo h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .logo p {
    color: var(--muted);
    font-size: 14px;
    margin-top: 4px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
  }
  .card h2 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .card .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 28px;
  }
  .field {
    margin-bottom: 18px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }
  .btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 8px;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .msg {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    display: none;
  }
  .msg.error { background: rgba(248,113,113,0.1); color: var(--error); border: 1px solid rgba(248,113,113,0.2); }
  .msg.success { background: rgba(52,211,153,0.1); color: var(--success); border: 1px solid rgba(52,211,153,0.2); }
  .msg.show { display: block; }
  .forgot {
    text-align: right;
    margin-top: 10px;
  }
  .forgot a {
    color: var(--accent);
    font-size: 13px;
    text-decoration: none;
  }
  .back {
    text-align: center;
    margin-top: 24px;
  }
  .back a {
    color: var(--muted);
    font-size: 13px;
    text-decoration: none;
  }
  .back a:hover { color: var(--text); }
  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-mark">M</div>
    <h1>Mind</h1>
    <p>Saúde mental no trabalho</p>
  </div>
  <div class="card">
    <h2>Bem-vindo de volta</h2>
    <p class="subtitle">Entre com seu e-mail e senha</p>
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="forgot"><a href="#">Esqueci minha senha</a></div>
    <button class="btn" id="btnLogin" onclick="fazerLogin()">Entrar</button>
    <div class="msg" id="msg"></div>
  </div>
  <div class="back"><a href="index.html">← Voltar para o início</a></div>
</div>

<script>
const SUPABASE_URL = 'https://uqzmkctsjvjpohzbvtjv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_2Fp_Vyz1feYA03TEUZortQ_fgbFRwEW';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Redireciona se já logado
db.auth.getSession().then(({ data }) => {
  if (data.session) redirecionarPorPerfil(data.session.user);
});

function mostrarMsg(texto, tipo) {
  const el = document.getElementById('msg');
  el.textContent = texto;
  el.className = 'msg ' + tipo + ' show';
}

async function redirecionarPorPerfil(user) {
  const email = user.email;

  // 1. Checa se é psicóloga
  const { data: psi } = await db.from('psicologos').select('id').eq('email', email).maybeSingle();
  if (psi) { window.location.href = 'dashboard-psicologo.html'; return; }

  // 2. Checa se é empresa
  const { data: emp } = await db.from('empresas').select('id').eq('email', email).maybeSingle();
  if (emp) { window.location.href = 'empresa.html'; return; }

  // 3. Padrão: paciente
  window.location.href = 'dashboard-paciente.html';
}

async function fazerLogin() {
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  const btn = document.getElementById('btnLogin');

  if (!email || !senha) {
    mostrarMsg('Preencha e-mail e senha.', 'error');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Entrando...';

  const { data, error } = await db.auth.signInWithPassword({ email, password: senha });

  if (error) {
    mostrarMsg('E-mail ou senha incorretos.', 'error');
    btn.disabled = false;
    btn.textContent = 'Entrar';
    return;
  }

  mostrarMsg('Login realizado! Redirecionando...', 'success');
  await redirecionarPorPerfil(data.user);
}

// Enter para logar
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') fazerLogin();
});
</script>
</body>
</html>
